<html lang="pt-BR">
<head>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* ── MONITOR OVERLAY ── */
        #monitorBanner {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 9999;
            background: #c0392b;
            color: #fff;
            text-align: center;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            animation: flashBanner 1s infinite alternate;
        }
        @keyframes flashBanner {
            from { background: #c0392b; }
            to   { background: #922b21; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .school-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        /* ── STUDENT INFO: 4 colunas ── */
        .student-info {
            display: grid;
            grid-template-columns: 2fr 0.7fr 0.7fr 1fr;
            gap: 14px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .info-group {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .info-field {
            padding: 12px;
            border: 2px solid white;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .info-field::placeholder { color: rgba(255,255,255,0.7); }
        .info-field option { color: #333; background: white; }

        .activity-title {
            font-size: 28px;
            font-weight: 700;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }

        .content { padding: 40px 30px; }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
            margin: 40px 0 25px 0;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ── QUESTION CARD ── */
        .question-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 25px 25px 0 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        /* Accent bar at BOTTOM of card */
        .question-card::after {
            content: '';
            display: block;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 0 0 12px 12px;
            margin-top: 20px;
        }

        .question-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #667eea;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 18px;
            margin-right: 12px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .question-header {
            display: flex;
            align-items: flex-start;
        }

        .question-text {
            font-size: 16px;
            color: #333;
            line-height: 1.7;
            margin-bottom: 20px;
            font-weight: 500;
            flex: 1;
        }

        .question-image {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: block;
        }

        /* ── OPTIONS ── */
        .options { margin-top: 20px; }

        .option {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(5px);
        }

        .option input[type="radio"] {
            margin-top: 4px;
            cursor: pointer;
            accent-color: #667eea;
        }

        /* Alternating selection colors: verde e azul */
        .option.selected-green {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            border-color: #27ae60;
        }

        .option.selected-blue {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .option label {
            cursor: pointer;
            flex: 1;
            font-size: 15px;
            line-height: 1.5;
        }

        /* ── DISSERTATIVA CARD ── */
        .dissertativa-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 25px 25px 0 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .dissertativa-card::after {
            content: '';
            display: block;
            height: 5px;
            background: linear-gradient(90deg, #764ba2, #667eea);
            border-radius: 0 0 12px 12px;
            margin-top: 20px;
        }

        .dissertativa-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #764ba2;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .dissertativa-text {
            font-size: 16px;
            color: #333;
            line-height: 1.7;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .response-field {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        .response-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        /* ── BUTTONS ── */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #submitBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        #submitBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.6);
        }

        #clearBtn {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        #clearBtn:hover { background: #e0e0e0; border-color: #ccc; }

        /* ── RESULT MESSAGE ── */
        .result-message {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .result-message.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .result-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── MONITOR LOG ── */
        #monitorLog {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .student-info { grid-template-columns: 1fr 1fr; }
            .activity-title { font-size: 22px; }
            .buttons { flex-direction: column; }
        }

        @media (max-width: 480px) {
            .student-info { grid-template-columns: 1fr; }
        }
    </style>
</head>

// Gabarito (0-indexed)
const correctAnswers = { 1: 2, 2: 2, 3: 2, 4: 3, 5: 3 };

// ═══════════════════════════════════════════════════════
//  MONITOR DE TROCA DE ABA / TELA
// ═══════════════════════════════════════════════════════
let switchCount = 0;
const banner = document.getElementById("monitorBanner");
const logDiv = document.getElementById("monitorLog");

function recordSwitch(reason) {
    switchCount++;
    const ts = new Date().toLocaleTimeString("pt-BR");
    banner.textContent = `⚠️ ALERTA: ${reason} detectado(a)! Esta é a ocorrência nº ${switchCount} — registrada às ${ts}.`;
    banner.style.display = "block";
    logDiv.textContent = `Saídas de tela registradas: ${switchCount}`;
    setTimeout(() => { banner.style.display = "none"; }, 5000);
}

document.addEventListener("visibilitychange", () => {
    if (document.hidden) recordSwitch("Troca de aba");
});

window.addEventListener("blur", () => {
    if (document.visibilityState === "visible") recordSwitch("Janela em segundo plano");
});

// Detect split-screen / window resize to very small width
window.addEventListener("resize", () => {
    if (window.outerWidth > 0 && window.innerWidth < window.outerWidth * 0.6) {
        recordSwitch("Divisão de tela");
    }
});

// ═══════════════════════════════════════════════════════
//  INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
    const now = new Date();
    document.getElementById("currentDate").value = now.toLocaleDateString("pt-BR");

    const select = document.getElementById("studentName");
    const gradeField = document.getElementById("studentGrade");
    const numberField = document.getElementById("studentNumber");

    // Popular dropdown com número + nome
    Object.entries(students).forEach(([grade, list]) => {
        const group = document.createElement("optgroup");
        group.label = grade;
        list.forEach(({ num, name }) => {
            const option = document.createElement("option");
            option.value = `${grade}|${name}|${num}`;
            option.textContent = `${num} – ${name}`;
            group.appendChild(option);
        });
        select.appendChild(group);
    });

    // Ao selecionar nome → preenche série e número
    select.addEventListener("change", () => {
        if (select.value) {
            const [grade, , num] = select.value.split("|");
            gradeField.value = grade;
            numberField.value = num;
        } else {
            gradeField.value = "";
            numberField.value = "";
        }
    });

    // ── Renderizar questões ──
    const container = document.getElementById("questionsContainer");
    let mcCount = 0;
    let disCount = 0;

    questions.forEach((q) => {
        if (q.type === "multipla") {
            mcCount++;
            if (mcCount === 1) {
                const title = document.createElement("div");
                title.className = "section-title";
                title.textContent = "Questões de Múltipla Escolha";
                container.appendChild(title);
            }

            const card = document.createElement("div");
            card.className = "question-card";

            const header = document.createElement("div");
            header.className = "question-header";

            const num = document.createElement("span");
            num.className = "question-number";
            num.textContent = q.seqNum;

            const text = document.createElement("div");
            text.className = "question-text";
            text.textContent = q.question;

            header.appendChild(num);
            header.appendChild(text);
            card.appendChild(header);

            if (q.image) {
                const img = document.createElement("img");
                img.src = q.image;
                img.className = "question-image";
                img.onerror = function() { this.style.display = "none"; };
                card.appendChild(img);
            }

            const optionsDiv = document.createElement("div");
            optionsDiv.className = "options";

            // Track alternation: green first, then blue
            let useGreen = true;

            q.options.forEach((optText, idx) => {
                const optionDiv = document.createElement("div");
                optionDiv.className = "option";
                optionDiv.innerHTML = `
                    <input type="radio" name="q${q.id}" value="${idx}" id="q${q.id}_${idx}">
                    <label for="q${q.id}_${idx}">${String.fromCharCode(65 + idx)}) ${optText}</label>
                `;

                const radio = optionDiv.querySelector("input");
                radio.addEventListener("change", () => {
                    // Remove any selected class from siblings
                    optionsDiv.querySelectorAll(".option").forEach(o => {
                        o.classList.remove("selected-green", "selected-blue");
                    });
                    // Toggle between green and blue each click
                    optionDiv.classList.add(useGreen ? "selected-green" : "selected-blue");
                    useGreen = !useGreen;
                });

                optionsDiv.appendChild(optionDiv);
            });

            card.appendChild(optionsDiv);
            container.appendChild(card);

        } else {
            disCount++;
            if (disCount === 1) {
                const title = document.createElement("div");
                title.className = "section-title";
                title.textContent = "Questões Dissertativas";
                container.appendChild(title);
            }

            const card = document.createElement("div");
            card.className = "dissertativa-card";

            const label = document.createElement("div");
            label.className = "dissertativa-label";
            label.textContent = `Questão Dissertativa ${disCount}`;
            card.appendChild(label);

            const header = document.createElement("div");
            header.className = "question-header";

            const num = document.createElement("span");
            num.className = "question-number";
            num.textContent = q.seqNum;

            const text = document.createElement("div");
            text.className = "dissertativa-text";
            text.textContent = q.question;

            header.appendChild(num);
            header.appendChild(text);
            card.appendChild(header);

            if (q.image) {
                const img = document.createElement("img");
                img.src = q.image;
                img.className = "question-image";
                img.onerror = function() { this.style.display = "none"; };
                card.appendChild(img);
            }

            const textarea = document.createElement("textarea");
            textarea.className = "response-field";
            textarea.id = `d${disCount}`;
            textarea.placeholder = "Escreva sua resposta aqui...";
            card.appendChild(textarea);

            container.appendChild(card);
        }
    });

    // ── Limpar ──
    document.getElementById("clearBtn").addEventListener("click", () => {
        document.querySelectorAll("input[type='radio']").forEach(r => r.checked = false);
        document.querySelectorAll("textarea").forEach(t => t.value = "");
        document.querySelectorAll(".option").forEach(o => {
            o.classList.remove("selected-green", "selected-blue");
        });
        document.getElementById("resultMessage").style.display = "none";
    });

    // ── Enviar ──
    document.getElementById("submitBtn").addEventListener("click", () => {
        if (!select.value) {
            showResult("Selecione seu nome.", "error");
            return;
        }

        const [grade, name, num] = select.value.split("|");
        const data = {
            studentName: name,
            studentNumber: num,
            studentGrade: grade,
            date: new Date().toLocaleString("pt-BR"),
            switchCount: switchCount
        };

        // Validar objetivas
        let correct = 0;
        for (let i = 1; i <= 5; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) {
                showResult("Responda todas as questões de múltipla escolha.", "error");
                return;
            }
            const value = parseInt(selected.value);
            data[`q${i}`] = String.fromCharCode(65 + value);
            if (value === correctAnswers[i]) correct++;
        }

        // Validar dissertativas
        for (let i = 1; i <= 5; i++) {
            const textarea = document.getElementById(`d${i}`);
            if (!textarea.value.trim()) {
                showResult(`Responda a questão dissertativa ${i}.`, "error");
                return;
            }
            data[`d${i}`] = textarea.value.trim();
        }

        data.correct = correct;
        data.percentage = (correct / 5) * 100;

        showResult(`Enviando respostas... Você acertou ${correct}/5 questões objetivas.`, "success");
        sendToGoogleSheets(data);
    });
});

function showResult(message, type) {
    const resultDiv = document.getElementById("resultMessage");
    resultDiv.textContent = message;
    resultDiv.className = `result-message ${type}`;
    resultDiv.style.display = "block";
    resultDiv.scrollIntoView({ behavior: "smooth" });
}

function sendToGoogleSheets(data) {
    // Substitua pela URL do seu Apps Script publicado
    const scriptUrl = "https://script.google.com/macros/s/AKfycbyW3A3yNzdqexP7NLpONPQIuJfpCEvpNKVd7z-9md_29tnY_uMZ1GTqftca5cnWRgn8/exec";
    fetch(scriptUrl, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(() => {
        showResult("✅ Sucesso! Suas respostas foram registradas.", "success");
    })
    .catch(error => {
        console.error("Erro:", error);
        showResult("❌ Erro ao enviar. Tente novamente.", "error");
    });
}
</script>
